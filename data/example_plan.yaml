# yaml-language-server: $schema=../schema/plan.schema.json
# Edit this file directly — IDE autocomplete is enabled via the schema above.
#
# COPILOT CHAT TIPS:
#   "Suggest 3 more tasks for the infrastructure pillar"
#   "What dependencies am I missing between these tasks?"
#   "Update infra-002 status to wip and evaluation to on_track"
#   "Summarize my current plan progress"

meta:
  title: "2025 Engineering Technical Roadmap"
  owner: "Platform Engineering Team"
  created: "2025-01-01"
  updated: "2025-01-01"
  version: 1

ai:
  provider: anthropic # anthropic | openai | github-copilot | ollama | none
  model: claude-sonnet-4-6
  # Provider env vars:
  #   anthropic      → ANTHROPIC_API_KEY
  #   openai         → OPENAI_API_KEY
  #   github-copilot → GITHUB_TOKEN
  #   ollama         → no key needed (default: http://localhost:11434)

current_state: |
  Our platform runs as a monolithic Rails application deployed on bare metal servers.
  Infrastructure is managed manually with ad-hoc scripts. Test coverage is around 30%.
  Security posture has not been formally audited. On-call burden is high due to fragile
  deployments and lack of observability.

target_state: |
  Fully containerized microservices deployed on Kubernetes with GitOps workflows.
  Infrastructure managed entirely through Terraform IaC. Test coverage above 80%.
  SOC2 Type II compliant. On-call burden reduced by 60% through better observability
  and automated remediation. Developer productivity improved with standardized tooling.

pillars:
  - id: infrastructure
    name: "Infrastructure"
    description: "Cloud infrastructure, containerization, and DevOps automation"
    tasks:
      - id: infra-001
        title: "Containerize all services with Docker"
        description: "Create Dockerfiles for each service, set up docker-compose for local dev"
        status: done
        evaluation: exceeds
        priority: high
        created: "2025-01-01"
        updated: "2025-02-15"
        dependencies: []
        notes: "Completed ahead of schedule. All 12 services containerized."

      - id: infra-002
        title: "Migrate to Kubernetes (staging)"
        description: "Deploy containerized services to K8s staging cluster"
        status: wip
        evaluation: on_track
        priority: high
        created: "2025-01-01"
        updated: "2025-03-01"
        dependencies:
          - infra-001
        notes: "Staging migration 70% complete. 8/12 services migrated."

      - id: infra-003
        title: "Migrate to Kubernetes (production)"
        description: "Promote K8s setup to production with zero-downtime migration"
        status: todo
        evaluation: not_started
        priority: high
        created: "2025-01-01"
        updated: "2025-01-01"
        dependencies:
          - infra-002
        notes: ""

      - id: infra-004
        title: "Implement Terraform IaC"
        description: "Replace all manual infrastructure provisioning with Terraform modules"
        status: todo
